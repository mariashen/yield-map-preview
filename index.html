<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Yield Map — Electric Capital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Chart.js + plugins -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Data + chart modules -->
<script src="charts/data.js?v=2"></script>
<script src="charts/taxonomy-categories.js?v=4"></script>
<script src="charts/taxonomy-subcategories.js?v=4"></script>
<script src="charts/taxonomy-data.js?v=6"></script>
<script src="charts/utils.js"></script>
<script src="charts/chart-modules.js?v=16"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0e17;
  color: #c8d0e8;
  line-height: 1.7;
}

.article-wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 48px 24px 80px;
}

/* Typography */
h1 { font-size: 36px; font-weight: 800; color: #f0f4ff; margin-bottom: 4px; }
h2 { font-size: 22px; font-weight: 700; color: #f0f4ff; margin-top: 48px; margin-bottom: 16px; line-height: 1.3; }
h3 { font-size: 17px; font-weight: 600; color: #e2e8f0; margin-top: 32px; margin-bottom: 12px; }
p { margin-bottom: 16px; }
strong { color: #f0f4ff; font-weight: 600; }
em { color: #94a3b8; }
a { color: #818cf8; text-decoration: none; }
a:hover { text-decoration: underline; }
hr { border: none; border-top: 1px solid #1e293b; margin: 48px 0; }
ul, ol { margin-bottom: 16px; padding-left: 24px; }
li { margin-bottom: 8px; }
blockquote { border-left: 3px solid #334155; padding-left: 16px; color: #94a3b8; margin: 16px 0; }
code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #e2e8f0; }

/* Tables */
table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 14px; }
th { background: #0f1320; color: #e2e8f0; font-weight: 600; text-align: left; padding: 10px 12px; border: 1px solid #1e293b; }
td { padding: 8px 12px; border: 1px solid #1e293b; }
tr:nth-child(even) { background: #0b1020; }

/* Chart slots */
.chart-slot { margin: 32px -12px; }
.chart-box {
  background: #0f1320;
  border: 1px solid #1a2038;
  border-radius: 10px;
  padding: 24px 28px;
}
.chart-title { font-size: 14px; font-weight: 600; color: #e2e8f0; margin-bottom: 12px; }
.filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.filters button {
  background: #1a2038; border: 1px solid #2a3050; border-radius: 6px;
  color: #8892b0; padding: 5px 12px; font-size: 11px; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
}
.filters button:hover { border-color: #4a5580; color: #c8d0e8; }
.filters button.active { background: #2a3058; border-color: #6366f1; color: #e0e6f0; }
.filters button.excluded { opacity: 0.4; text-decoration: line-through; }
.chart-wrap { position: relative; height: 500px; }
.chart-wrap canvas { position: absolute; inset: 0; }
.exclusion-note { font-size: 11px; color: #5a6780; margin-top: 2px; font-style: italic; }

/* Stat row */
.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 16px;
  margin: 32px 0;
}
.stat-card {
  background: #0f1320;
  border: 1px solid #1a2038;
  border-radius: 10px;
  padding: 20px 16px;
  text-align: center;
}
.stat-value { font-size: 28px; font-weight: 800; color: #818cf8; margin-bottom: 4px; }
.stat-label { font-size: 13px; color: #8892b0; line-height: 1.4; }

/* Placeholder for missing charts */
.chart-placeholder {
  background: #0f1320;
  border: 1px dashed #2a3050;
  border-radius: 10px;
  padding: 48px 24px;
  text-align: center;
  color: #4a5580;
  font-size: 14px;
}

/* Taxonomy iframe */
.chart-slot iframe {
  width: 100%;
  height: 620px;
  border: 1px solid #1a2038;
  border-radius: 10px;
  background: #0a0e17;
}
</style>
</head>
<body>
<div class="article-wrap" id="article"></div>

<script>
// Override injectStyles — the viewer provides its own styles
window.injectStyles = function() {};

async function init() {
  var resp = await fetch('article-draft-v7.md?v=' + Date.now());
  var md = await resp.text();

  // ── Pre-process: replace [chart:id] markers with HTML containers ──
  var chartIdx = 0;
  md = md.replace(/\[chart:([a-z0-9-]+)\]/g, function(_, id) {
    var slotId = 'chart-' + id + '-' + (++chartIdx);
    return '\n<div class="chart-slot" id="' + slotId + '" data-chart="' + id + '"></div>\n';
  });

  // ── Pre-process: replace [stat-row: ...] with stat cards ──
  md = md.replace(/\[stat-row:\s*(.+?)\]/g, function(_, content) {
    var items = content.split('|').map(function(s) { return s.trim(); });
    var cards = items.map(function(item) {
      var match = item.match(/\*\*(.+?)\*\*\s*(.*)/);
      if (match) {
        return '<div class="stat-card"><div class="stat-value">' + match[1] + '</div><div class="stat-label">' + match[2] + '</div></div>';
      }
      return '<div class="stat-card"><div class="stat-label">' + item + '</div></div>';
    });
    return '<div class="stat-row">' + cards.join('') + '</div>';
  });

  // ── Render markdown ──
  document.getElementById('article').innerHTML = marked.parse(md);

  // ── Initialize charts ──
  document.querySelectorAll('.chart-slot').forEach(function(slot) {
    var chartId = slot.dataset.chart;
    if (CHARTS[chartId]) {
      try { CHARTS[chartId](slot); } catch(e) {
        console.error('Chart error [' + chartId + ']:', e);
        slot.innerHTML = '<div class="chart-placeholder">Chart: ' + chartId + '<br><small style="color:#ef4444">' + e.message + '</small></div>';
      }
    } else if (chartId === 'taxonomy') {
      slot.innerHTML = '<iframe src="charts/explore/taxonomy.html?v=5" loading="lazy"></iframe>';
    } else {
      slot.innerHTML = '<div class="chart-placeholder">Chart: ' + chartId + '<br><small>Coming soon</small></div>';
    }
  });
}

init();
</script>
</body>
</html>
